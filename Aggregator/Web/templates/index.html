{% extends "base.html" %}
{% block main %}

<div class="drawer lg:hidden">
    <input id="mobile-filters-drawer" type="checkbox" class="drawer-toggle" />
    <div class="drawer-side z-50">
        <label for="mobile-filters-drawer" class="drawer-overlay"></label>
        <div class="w-80 max-w-[85vw] min-h-full bg-base-100 p-4 overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <span class="font-semibold text-base">Фильтры</span>
                <label for="mobile-filters-drawer" class="btn btn-ghost btn-sm">✕</label>
            </div>

            {% set form_id = "filters-form-mobile" %}
            {% include "components/filters.html" %}
        </div>
    </div>
</div>

<div class="flex gap-6 items-start">
    <div class="hidden lg:block sticky top-6 self-start w-80">
        {% set form_id = "filters-form-desktop" %}
        {% include "components/filters.html" %}
    </div>

    <div class="flex-1 min-w-0">
        <div id="news-feed" class="flex flex-col gap-4">
            {% include "components/news_list.html" %}
        </div>
    </div>
</div>
{% endblock %}
